<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RoboCup@Home — Team</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #1e1f22;
    --surface: #2b2d31;
    --border: rgba(255,255,255,0.08);
    --accent: #00e5a0;
    --accent2: #4d9fff;
    --text: #dbdee1;
    --muted: #848891;
    --font-head: 'Space Mono', monospace;
    --font-body: 'DM Sans', sans-serif;
  }
  [data-theme="light"] {
    --bg: #ffffff;
    --surface: #f2f3f5;
    --border: rgba(0,0,0,0.08);
    --accent: #00a875;
    --accent2: #1a6fd4;
    --text: #1a1b1e;
    --muted: #5c5f66;
  }
  body { background: var(--bg); color: var(--text); font-family: var(--font-body); font-size: 15px; line-height: 1.6; }

  /* NAV */
  nav { display: flex; justify-content: space-between; align-items: center; padding: 1.25rem 3rem; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: rgba(30,31,34,0.92); backdrop-filter: blur(10px); z-index: 100; }
  [data-theme="light"] nav { background: rgba(255,255,255,0.92); }
  .nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
  .nav-logo-text { font-family: var(--font-head); font-size: 13px; color: var(--accent); letter-spacing: 0.05em; line-height: 1.2; }
  .nav-links { display: flex; gap: 2rem; list-style: none; }
  .nav-links a { color: var(--muted); text-decoration: none; font-size: 14px; transition: color 0.2s; }
  .nav-links a:hover, .nav-links a.active { color: var(--text); }
  .nav-cta { background: var(--accent); color: #000; font-weight: 600; padding: 0.5rem 1.25rem; border-radius: 6px; text-decoration: none; font-size: 13px; font-family: var(--font-head); letter-spacing: 0.02em; transition: opacity 0.2s; }
  .nav-cta:hover { opacity: 0.85; }

  /* CONTENT */
  .container { max-width: 860px; margin: 0 auto; padding: 4rem 3rem; }

  /* BACK LINK */
  .back-link { display: inline-flex; align-items: center; gap: 6px; font-family: var(--font-head); font-size: 12px; color: var(--muted); text-decoration: none; margin-bottom: 2.5rem; transition: color 0.2s; }
  .back-link:hover { color: var(--accent); }

  /* TEAM HEADER */
  .team-header { border-bottom: 1px solid var(--border); padding-bottom: 2rem; margin-bottom: 2.5rem; }
  .team-tag { font-family: var(--font-head); font-size: 11px; letter-spacing: 0.18em; color: var(--accent); text-transform: uppercase; margin-bottom: 0.75rem; display: flex; align-items: center; gap: 10px; }
  .team-tag::before { content: ''; display: block; width: 30px; height: 1px; background: var(--accent); }
  .team-name { font-family: var(--font-head); font-size: clamp(1.8rem, 3vw, 2.5rem); font-weight: 700; line-height: 1.1; margin-bottom: 1rem; }
  .team-meta { display: flex; flex-wrap: wrap; gap: 1.5rem; margin-bottom: 1.5rem; }
  .team-meta-item { display: flex; flex-direction: column; gap: 2px; }
  .team-meta-label { font-family: var(--font-head); font-size: 10px; letter-spacing: 0.12em; color: var(--muted); text-transform: uppercase; }
  .team-meta-value { font-size: 14px; color: var(--text); }
  .team-links { display: flex; gap: 1rem; flex-wrap: wrap; }
  .team-link-btn { display: inline-flex; align-items: center; gap: 6px; padding: 0.5rem 1rem; border-radius: 6px; font-family: var(--font-head); font-size: 12px; text-decoration: none; border: 1px solid var(--border); color: var(--text); transition: border-color 0.2s, background 0.2s; }
  .team-link-btn:hover { border-color: var(--accent); color: var(--accent); }
  .team-link-btn.primary { background: var(--accent); color: #000; border-color: var(--accent); }
  .team-link-btn.primary:hover { opacity: 0.85; color: #000; }

  /* SECTIONS */
  .section { margin-bottom: 3rem; }
  .section-label { font-family: var(--font-head); font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--accent); margin-bottom: 0.5rem; }
  .section-title { font-family: var(--font-head); font-size: 1.2rem; font-weight: 700; margin-bottom: 1.25rem; }

  /* RESULTS TABLE */
  .results-table { width: 100%; border-collapse: collapse; }
  .results-table th { font-family: var(--font-head); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); text-align: left; padding: 0.6rem 1rem; border-bottom: 1px solid var(--border); }
  .results-table td { font-size: 14px; padding: 0.75rem 1rem; border-bottom: 1px solid var(--border); }
  .results-table tr:last-child td { border-bottom: none; }
  .results-table tr:hover td { background: var(--surface); }
  .place-badge { display: inline-flex; align-items: center; justify-content: center; width: 28px; height: 28px; border-radius: 50%; font-family: var(--font-head); font-size: 12px; font-weight: 700; }
  .place-1 { background: rgba(255,215,0,0.15); color: #ffd700; }
  .place-2 { background: rgba(192,192,192,0.15); color: #c0c0c0; }
  .place-3 { background: rgba(205,127,50,0.15); color: #cd7f32; }
  .place-other { background: var(--surface); color: var(--muted); }

  /* NO RESULTS */
  .no-results { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 2rem; text-align: center; color: var(--muted); font-size: 14px; }

  /* LOADING */
  .loading { color: var(--muted); font-size: 14px; padding: 1rem 0; }

  /* FOOTER */
  footer { border-top: 1px solid var(--border); padding: 2rem 3rem; display: flex; justify-content: space-between; align-items: center; }
  .footer-copy { font-size: 13px; color: var(--muted); font-family: var(--font-head); }
  .footer-links { display: flex; gap: 1.5rem; }
  .footer-links a { font-size: 13px; color: var(--muted); text-decoration: none; }
  .footer-links a:hover { color: var(--text); }

  /* RESPONSIVE */
  @media (max-width: 900px) {
    nav { padding: 1rem 1.5rem; }
    .nav-links { display: none; }
    .container { padding: 2rem 1.5rem; }
    footer { flex-direction: column; gap: 1rem; text-align: center; padding: 1.5rem; }
  }
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <a href="index.html" class="nav-logo">
    <div style="width:34px;height:34px;border-radius:6px;background:rgba(0,229,160,0.15);border:1px solid rgba(0,229,160,0.3);display:flex;align-items:center;justify-content:center;">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="8" r="4" stroke="#00e5a0" stroke-width="1.5"/>
        <rect x="7" y="14" width="10" height="7" rx="2" stroke="#00e5a0" stroke-width="1.5"/>
        <line x1="9" y1="14" x2="8" y2="11" stroke="#00e5a0" stroke-width="1.5"/>
        <line x1="15" y1="14" x2="16" y2="11" stroke="#00e5a0" stroke-width="1.5"/>
      </svg>
    </div>
    <span class="nav-logo-text">RoboCup<br/>@Home</span>
  </a>
  <ul class="nav-links">
    <li><a href="index.html">About</a></li>
    <li><a href="teams.html" class="active">Teams</a></li>
    <li><a href="index.html#rules">Rules</a></li>
    <li><a href="index.html#media">Media</a></li>
    <li><a href="index.html#history">History</a></li>
  </ul>
  <div style="display:flex;align-items:center;gap:0.75rem;">
    <button id="theme-toggle" onclick="document.documentElement.dataset.theme = document.documentElement.dataset.theme === 'light' ? '' : 'light'; this.textContent = document.documentElement.dataset.theme === 'light' ? '☀️' : '🌙'" style="background:transparent;border:1px solid var(--border);color:var(--text);width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;">🌙</button>
    <a href="https://athome.robocup.org/call-for-participation/" class="nav-cta">Join 2026 →</a>
  </div>
</nav>

<!-- CONTENT -->
<div class="container">
  <a href="teams.html" class="back-link">← Back to all teams</a>
  <div id="team-content"><p class="loading">Loading team...</p></div>
</div>

<!-- FOOTER -->
<footer>
  <div class="footer-copy">© 2026 RoboCup@Home · Part of the RoboCup Federation</div>
  <div class="footer-links">
    <a href="https://athome.robocup.org/rules/">Rules</a>
    <a href="https://athome.robocup.org/committees/">Committees</a>
    <a href="https://athome.robocup.org/sponsors/">Sponsors</a>
    <a href="https://lists.robocup.org/mm/lists/robocup-athome.lists.robocup.org/">Contact</a>
  </div>
</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script>
const SHEET_ID = "1ff1rmnkY2Sg44vei5j0dZJsJzOrgXqlOVjVoW2G0H5k";
const TEAMS_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Teams`;
const RESULTS_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Results`;
const COMPETITIONS_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Competitions`;

const params = new URLSearchParams(window.location.search);
const teamId = params.get('id');

function fetchCSV(url) {
  return new Promise((resolve) => {
    Papa.parse(url, { download: true, header: true, complete: (r) => resolve(r.data) });
  });
}

function placeBadge(place) {
  const n = parseInt(place);
  const cls = n === 1 ? 'place-1' : n === 2 ? 'place-2' : n === 3 ? 'place-3' : 'place-other';
  const label = n === 1 ? '1st' : n === 2 ? '2nd' : n === 3 ? '3rd' : `${n}th`;
  return `<span class="place-badge ${cls}">${label}</span>`;
}

async function load() {
  if (!teamId) {
    document.getElementById('team-content').innerHTML = '<p style="color:var(--muted);">No team specified.</p>';
    return;
  }

  const [teams, results, competitions] = await Promise.all([
    fetchCSV(TEAMS_URL),
    fetchCSV(RESULTS_URL),
    fetchCSV(COMPETITIONS_URL)
  ]);

  const team = teams.find(t => t.team_id === teamId);
  if (!team) {
    document.getElementById('team-content').innerHTML = '<p style="color:var(--muted);">Team not found.</p>';
    return;
  }

  document.title = `RoboCup@Home — ${team.team_name}`;

  // Build competition lookup
  const compMap = {};
  competitions.forEach(c => { compMap[c.competition_id] = c; });

  // Get this team's results
  const teamResults = results.filter(r => r.team_id === teamId);

  // Build results table rows
  let resultsHTML = '';
  if (teamResults.length === 0) {
    resultsHTML = `<div class="no-results">No competition results recorded yet.</div>`;
  } else {
    const rows = teamResults.map(r => {
      const comp = compMap[r.competition_id] || {};
      const compName = comp.name || r.competition_id;
      const location = comp.city && comp.country ? `${comp.city}, ${comp.country}` : '—';
      const year = comp.year || '—';
      return `<tr>
        <td>${year}</td>
        <td>${compName}</td>
        <td>${location}</td>
        <td>${r.league}</td>
        <td>${placeBadge(r.place)}</td>
      </tr>`;
    }).join('');

    resultsHTML = `
      <table class="results-table">
        <thead>
          <tr>
            <th>Year</th>
            <th>Competition</th>
            <th>Location</th>
            <th>League</th>
            <th>Place</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>`;
  }

  // Build links
  const links = [];
  if (team.website) links.push(`<a href="${team.website}" target="_blank" class="team-link-btn primary">Website ↗</a>`);
  if (team.tdp && team.tdp !== 'Placeholder') links.push(`<a href="${team.tdp}" target="_blank" class="team-link-btn">Team Description Paper ↗</a>`);
  if (team.video) links.push(`<a href="${team.video}" target="_blank" class="team-link-btn">Video ↗</a>`);

  document.getElementById('team-content').innerHTML = `
    <div class="team-header">
      <div class="team-tag">Team Profile</div>
      <div class="team-name">${team.team_name}</div>
      <div class="team-meta">
        <div class="team-meta-item">
          <span class="team-meta-label">Institution</span>
          <span class="team-meta-value">${team.institution || '—'}</span>
        </div>
        <div class="team-meta-item">
          <span class="team-meta-label">City</span>
          <span class="team-meta-value">${team.city || '—'}</span>
        </div>
        <div class="team-meta-item">
          <span class="team-meta-label">Country</span>
          <span class="team-meta-value">${team.country || '—'}</span>
        </div>
        ${team.contact ? `<div class="team-meta-item">
          <span class="team-meta-label">Contact</span>
          <span class="team-meta-value">${team.contact}</span>
        </div>` : ''}
      </div>
      <div class="team-links">${links.join('')}</div>
    </div>

    <div class="section">
      <div class="section-label">Track Record</div>
      <div class="section-title">Competition history</div>
      ${resultsHTML}
    </div>`;
}

load();
</script>
</body>
</html>
