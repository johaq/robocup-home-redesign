<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Results — RoboCup@Home</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
  <link rel="stylesheet" href="assets/referee-tool/css/results.css">
</head>
<body>
  <div id="navbar"></div>

  <div id="results-loading" class="results-loading">Loading…</div>

  <div id="results-page" hidden>

    <div class="results-page-header">
      <a id="results-back-link" href="competition.html" class="back-link">← Competition</a>
      <div class="page-tag">Results</div>
      <h1 class="page-title" id="results-comp-title"></h1>
    </div>

    <div class="results-body">

      <!-- Overall standings -->
      <section class="results-section">
        <h2 class="results-section-title">Overall Standings</h2>
        <div id="results-overall" class="results-table-wrap">
          <div class="results-empty">No submitted runs yet.</div>
        </div>
      </section>

      <!-- Per-test sections -->
      <div id="results-per-test"></div>

    </div>
  </div>

  <div id="footer"></div>
  <script src="assets/js/main.js"></script>
  <script type="module" src="assets/referee-tool/js/results.js"></script>

</html>
