<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RoboCup@Home — Competition</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="assets/css/styles.css">
<link rel="stylesheet" href="assets/scoring/competition.css">
<link rel="stylesheet" href="assets/scoring/results.css">
</head>
<body>

<div id="navbar"></div>

<div class="comp-detail-back">
  <a id="back-link" href="history.html" class="back-link">← Back to history</a>
</div>

<div id="comp-loading" class="comp-loading">Loading…</div>

<!-- MODERN VIEW (adminCreated competitions) -->
<div id="comp-page" hidden>

  <div class="comp-page-header">
    <div class="page-tag">Competition</div>
    <h1 class="page-title" id="comp-title"></h1>
    <div class="comp-header-meta" id="comp-header-meta"></div>
  </div>

  <div class="comp-top-grid" id="comp-top-grid" style="grid-template-columns:1fr">
    <div class="comp-info-col">
      <div class="comp-card">
        <div class="comp-card-label">Event Details</div>
        <div id="comp-details"></div>
      </div>
      <div class="comp-card">
        <div class="comp-card-label">Participating Teams</div>
        <div id="comp-teams-list"></div>
      </div>
    </div>

    <div class="comp-live-col" id="comp-live-col" hidden>
      <div class="comp-card comp-live-card">
        <div class="comp-live-header">
          <span class="comp-live-dot"></span>
          <span class="comp-card-label" style="margin-bottom:0">Live Now</span>
          <div class="comp-live-watch-btns">
            <a id="comp-stream-link" href="#" class="comp-live-watch-btn" target="_blank" rel="noopener" hidden>▶ Stream</a>
            <a id="comp-live-link" href="#" class="comp-live-watch-btn" target="_blank" rel="noopener">Scores →</a>
          </div>
        </div>
        <div id="comp-live-slots"></div>
        <div id="comp-live-empty" class="comp-live-empty">No active runs right now.</div>
      </div>

      <div class="comp-card">
        <div class="comp-card-label">Up Next</div>
        <div id="comp-upcoming-slots"></div>
        <div id="comp-upcoming-empty" class="comp-live-empty">No upcoming slots today.</div>
      </div>
    </div>
  </div>

  <div class="comp-leaderboard-section" id="comp-leaderboard-section" hidden>
    <div class="comp-schedule-header" style="display:flex;align-items:baseline;gap:16px">
      <div class="page-tag" style="margin-bottom:0.5rem">Leaderboard</div>
      <a id="comp-results-link" href="#" class="comp-results-link">Full results →</a>
    </div>
    <div id="comp-leaderboard" class="comp-leaderboard"></div>
  </div>

  <div class="comp-schedule-section">
    <div class="comp-schedule-header">
      <div class="page-tag" style="margin-bottom:0.5rem">Schedule</div>
      <div id="comp-tz-note" class="comp-tz-note"></div>
    </div>
    <div id="comp-sched-outer" class="comp-sched-outer"></div>
    <div id="comp-sched-nodates" class="comp-sched-nodates" hidden>No schedule published yet.</div>
  </div>

</div>

<!-- LEGACY VIEW (older competitions without run data) -->
<div id="comp-legacy" hidden></div>

<!-- SLOT DETAIL PANEL (modern view only) -->
<div id="slot-panel-backdrop" class="slot-panel-backdrop" hidden></div>
<div id="slot-panel" class="slot-panel" hidden>
  <div class="slot-panel-header">
    <div>
      <div id="slot-panel-title" class="slot-panel-title"></div>
      <div id="slot-panel-meta"  class="slot-panel-meta"></div>
    </div>
    <button id="slot-panel-close" class="slot-panel-close" title="Close">×</button>
  </div>
  <div id="slot-panel-body" class="slot-panel-body"></div>
</div>

<div id="footer"></div>
<script src="assets/js/main.js"></script>
<script type="module" src="assets/js/banner.js"></script>
<script type="module" src="assets/js/competition.js"></script>
</body>
</html>
